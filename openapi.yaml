openapi: 3.0.0

info:
  title: Sovereign Identity Engine API
  version: 12.0.0

servers:
  - url: http://localhost:3000

paths:

  /:
    get:
      summary: Engine status

  /did/{address}:
    get:
      summary: Resolve DID

      parameters:
        - name: address
          in: path
          required: true
          schema:
            type: string

  /analyze/{address}:
    get:
      summary: Wallet identity analysis

      parameters:
        - name: address
          in: path
          required: true
          schema:
            type: string
