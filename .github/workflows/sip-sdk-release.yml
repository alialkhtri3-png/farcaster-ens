name: SIP SDK Release

on:
  push:
    tags:
      - "sip-sdk-v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@alialkhtri3-png"

      - name: Install SDK dependencies
        working-directory: sdk
        run: npm install

      - name: Publish SIP SDK
        working-directory: sdk
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
