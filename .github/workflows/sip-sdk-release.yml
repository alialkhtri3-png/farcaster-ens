name: SIP SDK Release

on:
  push:
    tags:
      - "sip-sdk-v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: sdk

    steps:
      - name: Checkout
        uses: actions/setup-node@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 26
          registry-url: https://npm.pkg.github.com
          scope: "@alialkhtri3-png"

      - name: Install
        run: npm ci

      - name: Publish SDK
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
