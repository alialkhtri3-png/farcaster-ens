name: Kotlin Sample CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  packages: read
  contents: read

jobs:
  kotlin-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Kotlin project
        run: ./gradlew build

      - name: Run tests
        run: ./gradlew test
