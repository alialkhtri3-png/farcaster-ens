name: Sovereign Identity CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: read

jobs:
  node:
    name: Node.js Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Verify
        run: |
          if [ -f verify_vc.js ]; then
            node verify_vc.js
          else
            echo "verify_vc.js not found - skip"
          fi
